<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>💍 Reception Booking 💍</title>

<style>
body { font-family: Arial; background: #fff0f5; padding: 20px; }
h1 { text-align: center; color: #e91e63; }
.box { background: white; padding: 15px; margin: 15px 0; border-radius: 10px; box-shadow: 0 0 8px gray; }
img { width: 140px; height: 100px; margin: 5px; border-radius: 8px; object-fit: cover; cursor: pointer; border: 2px solid transparent; }
img.selected { border-color: #e91e63; }
button { background: #e91e63; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; margin-top:10px; }
#result { margin-top: 20px; background: white; padding: 15px; border-radius: 10px; }
</style>

</head>
<body>

<h1>💍 Reception Booking 💍</h1>

<form id="bookingForm">

<!-- Hall Selection -->
<div class="box">
<h3>🏛 Function Hall Selection</h3>
<p>Click a hall image to view location:</p>

<div id="hallOptions">

<img src="https://media.weddingz.in/images/bbda52972b1de50671f1b9de639610de/Anais-Events-6.jpg"
onclick="openHall('https://www.google.com/maps/place/Taj+Coromandel+Chennai')">

<img src="https://cdn0.weddingwire.in/article/6077/original/1280/jpg/127706-flower-wedding-stage-decoration-1-the-wedding-experience.jpeg"
onclick="openHall('https://www.google.com/maps/place/ITC+Grand+Chola+Chennai')">

<img src="https://media.weddingz.in/images/09909f5de0dc38961cee6f533cb96fbf/Wedding-Reception-Stage-Decoration-Ideas29.jpg"
onclick="openHall('https://www.google.com/maps/place/Leela+Palace+Chennai')">

<img src="https://image.cdn.shpy.in/337348/SKU-1291_2-1712066594709.jpg?format=webp&width=600"
onclick="openHall('https://www.google.com/maps/place/Green+Park+Hotel+Chennai')">

<img src="https://www.manyavar.com/dw/image/v2/BJZV_PRD/on/demandware.static/-/Library-Sites-ManyavarSharedLibrary/default/dw92962608/manyavar%20images%20m/51938/Manyavar%20%26%20Mohey%20Non-Apparel%20-%20Reception%20Stage%20Decoration%20Ideas%20That%20Make%20a%20Statement_blog%201%20copy.jpg"
onclick="openHall('https://www.google.com/maps/place/Hyatt+Regency+Chennai')">

</div>
</div>

<!-- Location -->
<div class="box">
<h3>📍 Location</h3>
<input type="text" id="location" placeholder="Enter Location" required><br>
<button type="button" onclick="searchHalls()">🔍 Find Function Halls</button>
</div>

<!-- Guests -->
<div class="box">
<h3>👥 Number of Guests</h3>
<input type="number" id="guests" placeholder="Enter Number of Guests" min="1" required>
</div>

<!-- Food -->
<div class="box">
<h3>🍽 Food Menu</h3>
<select id="foodType">
<option>Veg</option>
<option>Non-Veg</option>
<option>Mixed</option>
</select><br><br>
<input type="text" id="foodItems" placeholder="Enter Your Favorite Dishes">
</div>

<!-- Music -->
<div class="box">
<h3>🎵 Music</h3>
<select id="music">
<option>DJ</option>
<option>Live Band</option>
<option>Classical</option>
<option>Playlist</option>
</select>
</div>

<!-- Photography -->
<div class="box">
<h3>📸 Photography Style</h3>
<select id="photography">
<option>Traditional</option>
<option>Candid</option>
<option>Drone</option>
<option>Photo Booth</option>
<option>Combination</option>
</select>
</div>

<!-- Contact -->
<div class="box">
<h3>📞 Your Contact Info</h3>
<input type="text" id="name" placeholder="Your Name" required><br><br>
<input type="email" id="email" placeholder="Your Email" required><br><br>
<input type="tel" id="phone" placeholder="Your Phone Number" required>
</div>

<center><button type="button" onclick="bookReception()">BookReception</button></center>
</form>

<div id="result"></div>

<script>

// Open selected hall in Google Maps
function openHall(mapLink) {
    window.open(mapLink, "_blank");
}

// Search halls based on user location
function searchHalls() {
    const location = document.getElementById('location').value;

    if(location) {
        const url = "https://www.google.com/maps/search/function+halls+in+" 
                    + encodeURIComponent(location);
        window.open(url, "_blank");
    } else {
        alert("Please enter location!");
    }
}

// Form submission
document.getElementById("bookingForm").addEventListener("submit", function(e){
    e.preventDefault();

    const location = document.getElementById('location').value;
    const guests = document.getElementById('guests').value;
    const foodType = document.getElementById('foodType').value;
    const foodItems = document.getElementById('foodItems').value || "Not specified";
    const music = document.getElementById('music').value;
    const photography = document.getElementById('photography').value;
    const name = document.getElementById('name').value;
    const email = document.getElementById('email').value;
    const phone = document.getElementById('phone').value;
alert("Reception Booked successfully ❤️");
let price=25000;
 window.location.href = "p.html?amount=" + price;
    document.getElementById('result').innerHTML =
        "<h2>✅ Booking confirmed!</h2>" +
        "<p><b>Name:</b> " + name + "</p>" +
        "<p><b>Email:</b> " + email + "</p>" +
        "<p><b>Phone:</b> " + phone + "</p>" +
        "<p><b>Location:</b> " + location + "</p>" +
        "<p><b>Guests:</b> " + guests + "</p>" +
        "<p><b>Food:</b> " + foodType + "</p>" +
        "<p><b>Dishes:</b> " + foodItems + "</p>" +
        "<p><b>Music:</b> " + music + "</p>" +
        "<p><b>Photography:</b> " + photography + "</p>" +
        "<p>We will contact you soon 💌</p>";
});

</script>

</body>
</html>
